kind = "web"
previewPath = "/"
title = "Islamic Products Store"
version = "1.0.0"
id = "artifacts/islamic-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18496

[services.development]
run = "pnpm --filter @workspace/islamic-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/islamic-store", "run", "build" ]
publicDir = "artifacts/islamic-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18496"
BASE_PATH = "/"
